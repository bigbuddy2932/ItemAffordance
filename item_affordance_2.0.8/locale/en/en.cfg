[mod-setting-description]
affordance-pipette-overrides=The native function for pipette uses a tile entity's placeable by to determine what pipette should select, causing component items to be selected instead of the appropriate afforded item. Enabling this allows a control script to fix this behavior.
affordance-pipette-autocraft=If this is enabled, then upon using pipette on an afforded tile entity a control script will automatically craft an afforded item if you have the right materials, your inventory can fit it, and you don't currently have the afforded item in your inventory.

affordance-place-with-base=This breaks the native pipette tool with __CONTROL__pipette__. This has been patched via a control script, but you can still disable this if you have issues.
affordance-retrieve-base=Strongly recommend keeping this enabled if placement with base components is enabled.

belt-component-rebalance=Change the cost of belts to reflect the added materials needed for undergrounds and splitters. Has no effect on the number of belts spent on other components.
belt-component-cost-underground-belt=Belts spent to build one side of an underground belt
belt-component-cost-splitter=Belts spent to build a splitter
belt-component-cost-lane-splitter=Belts spent to build a lane splitter
belt-component-loaders-enabled=Attempts to detect any installed loader mods and add affordance to them. Cost is dependent on the mod and its settings.

pipe-components=Includes flow control pipes, valves, and some modded storage tank variants

rail-signal-component-base=What rail signal should be the base used for placement and crafting the other

electric-pole-components=Two medium electric poles for one big electric pole

logistic-container-components=Applies to some modded containers as well
all-logistic-container-components=[virtual-signal=signal-alert] Will make sequence breaking possible if enabled! Makes it so all 5 logistic containers are grouped together for affordance
passive-logistic-container-component-base=What passive container type should be the base used for placement and crafting the other. Overrided if "Base active logistic container type" is set.
active-logistic-container-component-base=What active container type should be the base used for placement and crafting the others. Overrided if "Base active logistic container type" is set.
all-logistic-container-component-base=[virtual-signal=signal-alert] Will make sequence breaking possible if enabled! Groups all logistic container types together for affordance.

basic-circuit-network-component-base=What basic circuit network item should be the base used for placement and crafting the others

bob-machine-components=If the appropriate mods are installed then Bob's metal mixing furnaces will have affordance on the same tier and Bob's boilers will have affordance on the same tier

